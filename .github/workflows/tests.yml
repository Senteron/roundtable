name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check roundtable/ tests/

      - name: Unit tests
        run: uv run pytest tests/unit/ -q

      - name: Integration tests
        # The manifest-launch integration test needs uv on PATH; setup-uv
        # already provides it. Skipped via pytest's own logic if the
        # check fails.
        run: uv run pytest tests/integration/ -q

      # The `-m live` marker is intentionally NOT run in CI per D8 in
      # docs/review-concerns-plan.md. Maintainer runs it locally before
      # tag.
